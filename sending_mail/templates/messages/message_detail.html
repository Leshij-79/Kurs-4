
{% extends 'base.html' %}
{% block title %}Сообщения - {{ messages.subject }}{% endblock %}

{% block content %}

    <div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
        <h1 class="display-4">Сообщения</h1>
    </div>

    <div class="container">
        <div class="col-4">
        </div>
        <div class="col-4">
            <div class="row text-center">
                <form>
                    <h1>Тема сообщения:</h1>
                    <h2 class="my-0 font-weight-normal">{{ messages.subject }}</h2>
                    <h1> Текст сообщения</h1>
                    <h2>{{ messages.mail_body }}</h2>
                    <a role="button" class="btn btn-primary" href="{% url 'sending_mail:message_update' messages.pk %}">Редактировать</a>
                    <a role="button" class="btn btn-secondory" href="{% url 'sending_mail:message_delete' messages.pk %}">Удалить</a>
                    <a role="button" class="btn btn-secondary" href="{% url 'sending_mail:messages_list' %}">Назад</a>
                </form>
            </div>
        </div>
        <div class="col-4">
        </div>
        {% include 'footer.html' %}
    </div>

{% endblock %}
